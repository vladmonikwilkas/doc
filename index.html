<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета валидации работодателя</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .question {
            margin-bottom: 20px;
            text-align: left;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #34495e;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .counter {
            font-size: 12px;
            color: #95a5a6;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Анкета</h1>
        <form id="trollForm">
            <div id="questionsContainer"></div>
            <button type="button" onclick="alert('Ошибка 418: Рекрутер слишком подозрителен. Попробуйте заполнить все 9999 вопросов в полной версии.')">Отправить ответы</button>
        </form>
    </div>

    <script>
        const container = document.getElementById('questionsContainer');
        const questions = [
            "Ваше полное ФИО",
            "ИНН компании",
            "Почему вы выбрали именно меня?",
            "Ваш уровень IQ (подтвержденный)",
            "Готовы ли вы платить зарплату в биткоинах?",
            "Сколько кофе вы пьете в день?",
            "Ваше отношение к ботам на HH.ru",
            "Считаете ли вы этот вопрос важным?"
        ];

        for (let i = 1; i <= 100; i++) {
            const qDiv = document.createElement('div');
            qDiv.className = 'question';
            
            const randomQ = questions[Math.floor(Math.random() * questions.length)];
            
            qDiv.innerHTML = `
                <label>Вопрос #${i}: ${randomQ}</label>
                <input type="text" placeholder="Введите развернутый ответ...">
                <div class="counter">Символов: 0 / 1000</div>
            `;
            container.appendChild(qDiv);
        }
    </script>
</body>
</html>
